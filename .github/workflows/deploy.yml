name: Deploy to Dev Server
on:
  push:
    branches: ["master"]
  workflow_dispatch:
jobs:
  check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: 安装 ruff
        run: |
          if ! command -v ruff &> /dev/null; then
            curl -LsSf https://astral.sh/ruff/install.sh | sh
          fi
      - name: 架构检查
        run: python3 scripts/check_architecture.py
      - name: Lint 检查
        run: ~/.cargo/bin/ruff check . || ruff check .
  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Sync deploy checkout
        run: cd ~/project/fusion/fusion-api && git fetch origin && git reset --hard origin/master && git clean -fd
      - name: Deploy
        run: |
          cd ~/project/fusion/fusion-api
          if git diff HEAD~1 --name-only | grep -qE 'requirements\.txt|Dockerfile|docker-compose'; then
            cd ~/project/fusion
            for attempt in 1 2 3; do
              if docker compose up -d --build fusion-api; then
                exit 0
              fi
              docker compose rm -sf fusion-api || true
              sleep 5
            done
            exit 1
          else
            cd ~/project/fusion
            docker compose restart fusion-api
          fi
      - name: Cleanup
        run: |
          docker image prune -f
          docker builder prune --filter "until=72h" -f
