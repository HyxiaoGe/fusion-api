name: Fusion API Windows CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fusion-api-windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 40
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    env:
      IMAGE_NAME: ghcr.io/hyxiaoge/fusion-api
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Build Docker image
        run: |
          docker build -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Architecture check in image
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" python scripts/check_architecture.py

      - name: Lint in image
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" sh -lc "pip install --no-cache-dir ruff && ruff check ."

      - name: Test non-blocking while API test baseline is being cleaned up
        continue-on-error: true
        timeout-minutes: 3
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" python -m unittest discover -s test

      - name: Login to GHCR
        run: echo %GITHUB_TOKEN% | docker login ghcr.io -u %GITHUB_ACTOR% --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: docker push "%IMAGE_NAME%:%GITHUB_SHA%"

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart fusion-api
        run: |
          cd ~/project/fusion
          docker pull ghcr.io/hyxiaoge/fusion-api:${{ github.sha }}
          cat > docker-compose.fusion-api-ghcr.yml <<'EOF'
          services:
            fusion-api:
              image: ghcr.io/hyxiaoge/fusion-api:${{ github.sha }}
              container_name: fusion-api
              command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
              restart: always
              ports:
                - "8002:8000"
              volumes:
                - ./fusion-api/logs:/app/logs
              environment:
                - DATABASE_URL=${DATABASE_URL}
                - SERVER_HOST=${SERVER_HOST}
                - FRONTEND_URL=${FRONTEND_URL}
                - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL}
                - AUTH_SERVICE_JWKS_URL=${AUTH_SERVICE_JWKS_URL}
                - AUTH_SERVICE_CLIENT_ID=${AUTH_SERVICE_CLIENT_ID}
                - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
                - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
                - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                - REDIS_URL=${REDIS_URL:-redis://middleware-redis:6379/0}
                - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
                - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm-proxy:4000}
                - LITELLM_API_KEY=${LITELLM_API_KEY:-}
                - ENABLE_DOCS=false
              deploy:
                resources:
                  limits:
                    cpus: "1"
                    memory: 1g
              networks:
                - postgres_default
                - middleware_default

          networks:
            postgres_default:
              external: true
            middleware_default:
              external: true
          EOF
          docker compose -f docker-compose.fusion-api-ghcr.yml up -d

      - name: Verify health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8002/health | grep -q '"status":"healthy"'; then
              exit 0
            fi
            sleep 2
          done

          docker logs --tail=120 fusion-api || true
          exit 1

      - name: Cleanup old images
        if: always()
        run: |
          current="ghcr.io/hyxiaoge/fusion-api:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ghcr.io/hyxiaoge/fusion-api \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            fusion-api \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "ghcr.io/hyxiaoge/fusion-api:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-api \
            "${{ env.DEPLOY_START }}"
