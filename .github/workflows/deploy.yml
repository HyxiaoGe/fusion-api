name: Fusion API Windows CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusion-api-windows-ci-${{ github.ref }}
  cancel-in-progress: true

# 镜像源:阿里云 ACR 个人版(深圳,境内端点);改仓名只动 IMAGE_NAME 一行
env:
  REGISTRY: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com/seanfield/fusion-api

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 40
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Configure Docker credential directory
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $dockerConfig = Join-Path $env:RUNNER_TEMP ".docker-$env:GITHUB_RUN_ID-$env:GITHUB_JOB"
          New-Item -ItemType Directory -Force -Path $dockerConfig | Out-Null
          "DOCKER_CONFIG=$dockerConfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Push CI/CD active metric
        if: github.ref == 'refs/heads/master'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        env:
          PUSHGW_AUTH: ${{ secrets.PUSHGW_BASIC_AUTH }}
        run: |
          $ProgressPreference = "SilentlyContinue"
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="fusion-api",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="fusion-api",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} $now
          "@
          $body = (($metrics -replace "`r`n", "`n").Trim() + "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          try {
            # pushgateway 本体只绑 loopback,经 nginx 9094 鉴权反代推送(凭证在仓库 Secret PUSHGW_BASIC_AUTH)
            Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.11:9094/metrics/job/cicd_active/project_key/fusion-api/branch_key/master/environment_key/dev" -ContentType "text/plain; version=0.0.4" -Headers @{ Authorization = "Basic $env:PUSHGW_AUTH" } -Body $bytes -TimeoutSec 5 | Out-Null
            Write-Host "CI/CD active metric pushed"
          } catch {
            Write-Host "CI/CD active metric push failed, ignored: $($_.Exception.Message)"
          }

      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Test and build Docker image
        timeout-minutes: 10
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $image = "${env:IMAGE_NAME}:${env:GITHUB_SHA}"
          & .\scripts\ci\run_windows_container_ci.ps1 -Image $image -LogDirectory "_ci-logs"
          exit $LASTEXITCODE

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $started = [DateTimeOffset]::UtcNow
          docker push "${env:IMAGE_NAME}:${env:GITHUB_SHA}" 2>&1 | ForEach-Object {
            $line = $_.ToString()
            Write-Host $line
            $line | Add-Content -LiteralPath "_ci-logs\image-push.log" -Encoding utf8
          }
          $exitCode = $LASTEXITCODE
          $finished = [DateTimeOffset]::UtcNow
          $result = [pscustomobject]@{
            name = "image-push"; display_name = "Push Docker image"
            status = $(if ($exitCode -eq 0) { "success" } else { "failure" })
            exit_code = $exitCode; started_at = $started.ToString("o"); finished_at = $finished.ToString("o")
            duration_seconds = [math]::Round(($finished - $started).TotalSeconds, 2)
            log_file = "_ci-logs\image-push.log"
          }
          $stages = [System.Collections.ArrayList]::new()
          if (Test-Path "_ci-logs\stages.json") {
            $parsedStages = Get-Content "_ci-logs\stages.json" -Raw | ConvertFrom-Json
            foreach ($stage in $parsedStages) { [void]$stages.Add($stage) }
          }
          [void]$stages.Add($result)
          $stages.ToArray() | ConvertTo-Json -Depth 4 | Out-File "_ci-logs\stages.json" -Encoding utf8
          exit $exitCode

      - name: Write CI build summary
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $stages = [System.Collections.ArrayList]::new()
          if (Test-Path "_ci-logs\stages.json") {
            $parsedStages = Get-Content "_ci-logs\stages.json" -Raw | ConvertFrom-Json
            foreach ($stage in $parsedStages) { [void]$stages.Add($stage) }
          }
          if (-not ($stages | Where-Object name -eq "image-push")) {
            [void]$stages.Add([pscustomobject]@{ name="image-push"; display_name="Push Docker image"; status="skipped"; exit_code=$null; duration_seconds=0; log_file=$null })
          }
          $lines = @("## Windows CI build summary", "", "Runner: `${{ runner.name }}`", "", "| Stage | Status | Duration (s) | Exit code |", "|---|---:|---:|---:|")
          foreach ($stage in $stages) {
            $exitCode = if ($null -eq $stage.exit_code) { "-" } else { $stage.exit_code }
            $lines += "| $($stage.display_name) | $($stage.status) | $($stage.duration_seconds) | $exitCode |"
          }
          $failed = $stages | Where-Object status -eq "failure" | Select-Object -First 1
          if ($failed) { $lines += @("", "First failure: **$($failed.display_name)** (`$($failed.log_file)`)" ) }
          $lines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload failed CI logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fusion-api-ci-logs-${{ github.run_id }}
          path: _ci-logs
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout smoke scripts
        uses: actions/checkout@v6

      - name: Login to ACR
        run: |
          # 登录失败时重试退避（境内 ACR 通常稳定，保留重试作防御）
          n=0
          until printf '%s' "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker login 重试 $n 次仍失败"; exit 1; fi
            echo "docker login 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Apply alembic migrations
        run: |
          cd ~/project/fusion
          set -a
          source .env
          set +a
          n=0
          until docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker pull 重试 $n 次仍失败"; exit 1; fi
            echo "docker pull 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
          docker run --rm \
            --network postgres_default \
            -e DATABASE_URL="${DATABASE_URL}" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            alembic upgrade head

      - name: Pull and restart fusion-api
        env:
          DEPLOY_PROMPTHUB_API_KEY: ${{ secrets.PROMPTHUB_API_KEY }}
          DEPLOY_PROMPTHUB_SYNC_MODE: ${{ vars.PROMPTHUB_SYNC_MODE || 'disabled' }}
        run: |
          cd ~/project/fusion
          set -o pipefail
          set -a
          source .env
          set +a
          export PROMPTHUB_API_KEY="${DEPLOY_PROMPTHUB_API_KEY:-}"
          export PROMPTHUB_SYNC_MODE="${DEPLOY_PROMPTHUB_SYNC_MODE:-disabled}"
          n=0
          until docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker pull 重试 $n 次仍失败"; exit 1; fi
            echo "docker pull 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
          # dev 中 auth-service 只在 Docker 网络内暴露，未发布宿主机 8100。
          # 显式覆盖旧 .env 里的宿主机地址，避免 fusion-api JWKS/userinfo 校验连到不可达地址。
          export AUTH_SERVICE_INTERNAL_BASE_URL="http://auth-service:8100"
          mkdir -p ./fusion-api/storage/files
          if docker container inspect fusion-api >/dev/null 2>&1; then
            if docker inspect fusion-api --format '{{range .Mounts}}{{println .Destination}}{{end}}' | grep -qx '/app/storage/files'; then
              echo "file storage already mounted; skip container file migration"
            elif docker exec fusion-api sh -lc 'test -d /app/storage/files'; then
              docker exec fusion-api sh -lc 'tar -C /app/storage/files -cf - .' | tar -C ./fusion-api/storage/files -xf -
            fi
          fi
          cat > docker-compose.fusion-api-ghcr.yml <<'EOF'
          services:
            fusion-api:
              image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
              container_name: fusion-api
              command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
              restart: always
              ports:
                - "8002:8000"
              volumes:
                - ./fusion-api/logs:/app/logs
                - ./fusion-api/storage/files:/app/storage/files
              environment:
                - DATABASE_URL=${DATABASE_URL}
                - SERVER_HOST=${SERVER_HOST}
                - FRONTEND_URL=${FRONTEND_URL}
                - CORS_ORIGINS=${CORS_ORIGINS}
                - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
                - FILE_STORAGE_PATH=/app/storage/files
                - FILE_UPLOAD_TIMEOUT_SECONDS=${FILE_UPLOAD_TIMEOUT_SECONDS:-60}
                - DIRECT_UPLOAD_STALE_SECONDS=${DIRECT_UPLOAD_STALE_SECONDS:-1800}
                - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
                - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
                - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
                - MINIO_BUCKET=${MINIO_BUCKET:-fusion-files}
                - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
                - MINIO_PRESIGN_EXPIRES=${MINIO_PRESIGN_EXPIRES:-3600}
                - OSS_ENDPOINT=${OSS_ENDPOINT:-}
                - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
                - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
                - OSS_BUCKET=${OSS_BUCKET:-}
                - OSS_USE_SSL=${OSS_USE_SSL:-true}
                - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL}
                - AUTH_SERVICE_JWKS_URL=${AUTH_SERVICE_JWKS_URL}
                - AUTH_SERVICE_CLIENT_ID=${AUTH_SERVICE_CLIENT_ID}
                - AUTH_SERVICE_INTERNAL_BASE_URL=${AUTH_SERVICE_INTERNAL_BASE_URL:-http://auth-service:8100}
                - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
                - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
                - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
                - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                - REDIS_URL=${REDIS_URL:-redis://middleware-redis:6379/0}
                - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
                - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm-proxy:4000}
                - LITELLM_API_KEY=${LITELLM_API_KEY:-}
                - PROMPTHUB_SYNC_MODE=${PROMPTHUB_SYNC_MODE:-disabled}
                - PROMPTHUB_BASE_URL=${PROMPTHUB_BASE_URL:-http://prompthub-backend:8000}
                - PROMPTHUB_API_KEY=${PROMPTHUB_API_KEY:-}
                - PROMPTHUB_PROJECT_SLUG=${PROMPTHUB_PROJECT_SLUG:-fusion}
                - PROMPTHUB_REQUEST_TIMEOUT_SECONDS=${PROMPTHUB_REQUEST_TIMEOUT_SECONDS:-3}
                - PROMPTHUB_SYNC_INTERVAL_SECONDS=${PROMPTHUB_SYNC_INTERVAL_SECONDS:-300}
                - PROMPTHUB_SYNC_ON_STARTUP=${PROMPTHUB_SYNC_ON_STARTUP:-true}
                - ENABLE_DOCS=false
              deploy:
                resources:
                  limits:
                    cpus: "1"
                    memory: 1g
              networks:
                - postgres_default
                - middleware_default
                - fusion-prompthub

          networks:
            postgres_default:
              external: true
            middleware_default:
              external: true
            fusion-prompthub:
              external: true
          EOF
          docker network inspect fusion-prompthub >/dev/null 2>&1 \
            || docker network create fusion-prompthub >/dev/null
          docker compose -f docker-compose.fusion-api-ghcr.yml up -d

      - name: Verify health
        run: |
          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8002/health | grep -q '"status":"healthy"'; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" != "1" ]; then
            docker logs --tail=120 fusion-api || true
            exit 1
          fi

          docker inspect fusion-api --format '{{range .Mounts}}{{println .Destination}}{{end}}' | grep -qx '/app/storage/files'
          docker exec -i fusion-api python - <<'PY'
          import asyncio
          import urllib.request

          from app.core.config import settings

          if settings.STORAGE_BACKEND == "local" and settings.FILE_STORAGE_PATH != "/app/storage/files":
              raise SystemExit(f"file storage path mismatch: {settings.FILE_STORAGE_PATH}")
          if settings.STORAGE_BACKEND == "oss":
              missing = [
                  name for name, value in {
                      "OSS_ENDPOINT": settings.OSS_ENDPOINT,
                      "OSS_ACCESS_KEY_ID": settings.OSS_ACCESS_KEY_ID,
                      "OSS_ACCESS_KEY_SECRET": settings.OSS_ACCESS_KEY_SECRET,
                      "OSS_BUCKET": settings.OSS_BUCKET,
                  }.items()
                  if not value
              ]
              if missing:
                  raise SystemExit(f"oss storage config missing: {', '.join(missing)}")
              from app.services.storage.oss_storage import OSSStorageBackend

              storage = OSSStorageBackend(
                  endpoint=settings.OSS_ENDPOINT,
                  access_key_id=settings.OSS_ACCESS_KEY_ID,
                  access_key_secret=settings.OSS_ACCESS_KEY_SECRET,
                  bucket=settings.OSS_BUCKET,
                  use_ssl=settings.OSS_USE_SSL,
              )
              upload = asyncio.run(
                  storage.get_upload_url(
                      "health/cors-preflight.txt",
                      content_type="text/plain",
                      expires=60,
                  )
              )
              origin = settings.FRONTEND_URL.rstrip("/")
              request = urllib.request.Request(
                  upload["url"],
                  method="OPTIONS",
                  headers={
                      "Origin": origin,
                      "Access-Control-Request-Method": "PUT",
                      "Access-Control-Request-Headers": "content-type",
                  },
              )
              with urllib.request.urlopen(request, timeout=10) as response:
                  headers = response.headers
              allow_origin = headers.get("Access-Control-Allow-Origin", "")
              allow_methods = headers.get("Access-Control-Allow-Methods", "")
              allow_headers = headers.get("Access-Control-Allow-Headers", "")
              if allow_origin not in {"*", origin}:
                  raise SystemExit("oss cors origin is not allowed")
              if "PUT" not in allow_methods.upper():
                  raise SystemExit("oss cors PUT method is not allowed")
              if "*" not in allow_headers and "CONTENT-TYPE" not in allow_headers.upper():
                  raise SystemExit("oss cors Content-Type header is not allowed")
          print(f"file storage backend ok: {settings.STORAGE_BACKEND}")
          PY

          docker exec -i fusion-api python - <<'PY'
          from app.core.config import settings
          import urllib.request

          url = settings.RESOLVED_AUTH_SERVICE_JWKS_URL
          with urllib.request.urlopen(url, timeout=5) as response:
              if response.status != 200:
                  raise SystemExit(f"auth JWKS check failed: http={response.status} url={url}")
          print(f"auth JWKS ok: {url}")
          PY

          docker exec -i fusion-api python - <<'PY'
          import asyncio
          import json
          import re
          import urllib.error
          import urllib.request

          from app.core.config import settings

          raw_mode = settings.PROMPTHUB_SYNC_MODE
          mode = getattr(raw_mode, "value", raw_mode).strip().lower()
          if mode == "disabled":
              print("PromptHub bundle smoke skipped: sync mode is disabled")
              raise SystemExit(0)
          if mode not in {"shadow", "apply"}:
              raise SystemExit(f"unsupported PromptHub sync mode: {mode}")

          base_url = settings.PROMPTHUB_BASE_URL.rstrip("/")
          project_slug = settings.PROMPTHUB_PROJECT_SLUG
          api_key = settings.PROMPTHUB_API_KEY
          if not base_url or not project_slug or not api_key:
              raise SystemExit("PromptHub bundle smoke config is incomplete")

          url = f"{base_url}/api/v1/projects/by-slug/{project_slug}/prompts/published"
          request = urllib.request.Request(
              url,
              headers={"Authorization": f"Bearer {api_key}"},
          )
          try:
              with urllib.request.urlopen(
                  request,
                  timeout=settings.PROMPTHUB_REQUEST_TIMEOUT_SECONDS,
              ) as response:
                  status = response.status
                  body = json.load(response)
          except urllib.error.HTTPError as exc:
              raise SystemExit(f"PromptHub bundle smoke failed: HTTP {exc.code}") from None
          except urllib.error.URLError as exc:
              raise SystemExit(f"PromptHub bundle smoke failed: {exc.reason}") from None

          if status != 200 or body.get("code") != 0:
              raise SystemExit("PromptHub bundle smoke returned an invalid response")
          data = body.get("data")
          if not isinstance(data, dict):
              raise SystemExit("PromptHub bundle smoke data is missing")
          prompts = data.get("prompts")
          revision = data.get("revision")
          if not isinstance(prompts, list) or len(prompts) != 11:
              count = len(prompts) if isinstance(prompts, list) else "invalid"
              raise SystemExit(f"PromptHub bundle smoke prompt count mismatch: {count}")
          if not isinstance(revision, str) or re.fullmatch(r"[0-9a-f]{64}", revision) is None:
              raise SystemExit("PromptHub bundle smoke revision is invalid")

          from app.db.database import SessionLocal
          from app.db.models import RuntimeConfigEntry
          from app.services.prompthub_sync_service import sync_prompthub_bundle

          sync_result = asyncio.run(sync_prompthub_bundle())
          if sync_result.get("status") != "success" or sync_result.get("revision") != revision:
              raise SystemExit("PromptHub sync did not persist the fetched revision")

          session = SessionLocal()
          try:
              rows = (
                  session.query(RuntimeConfigEntry)
                  .filter(
                      RuntimeConfigEntry.namespace == "prompt_bundle",
                      RuntimeConfigEntry.key == "fusion",
                  )
                  .all()
              )
          finally:
              session.close()
          matching = [row for row in rows if row.version == revision]
          active = [row for row in rows if row.is_active]
          if len(matching) != 1:
              raise SystemExit("PromptHub synced revision is missing or duplicated")
          if mode == "shadow" and matching[0].is_active:
              raise SystemExit("PromptHub shadow revision must remain inactive")
          if mode == "apply" and (not matching[0].is_active or len(active) != 1):
              raise SystemExit("PromptHub apply revision was not atomically activated")
          print(
              "PromptHub bundle smoke passed: "
              f"mode={mode} prompts={len(prompts)} revision={revision[:12]}... persisted=true"
          )
          PY

      - name: Run deployment smoke
        run: |
          # scripts/deployment_smoke.py checks /health and /api/models/.
          if ! python3 scripts/deployment_smoke.py --base-url http://127.0.0.1:8002; then
            echo "fusion-api deployment smoke failed"
            docker logs --tail=120 fusion-api || true
            exit 1
          fi

      - name: Cleanup old images
        if: always()
        run: |
          current="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ${{ env.IMAGE_NAME }} \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          if ! timeout 15s bash ~/scripts/push-cicd-metrics.sh \
            fusion-api \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-api \
            "${{ env.DEPLOY_START }}"; then
            echo "CI/CD metrics push failed, ignored"
          fi

      - name: 通知飞书(部署结果)
        if: always()
        continue-on-error: true
        env:
          FEISHU_INFRA_WEBHOOK: ${{ secrets.FEISHU_INFRA_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # 提交信息可含任意字符,只经 env 传入 python(os.environ→json),绝不进 shell,杜绝注入。
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$FEISHU_INFRA_WEBHOOK" ]; then
            echo "FEISHU_INFRA_WEBHOOK 未配置,跳过飞书通知"
            exit 0
          fi
          export SHORT_SHA="${GITHUB_SHA:0:7}"
          export DEPLOY_TS="$(date -u '+%Y-%m-%d %H:%M UTC')"
          python3 - <<'PY'
          import json, os, urllib.request
          ok = os.environ.get("JOB_STATUS") == "success"
          repo = os.environ.get("REPO", "")
          ref = os.environ.get("REF_NAME", "")
          sha = os.environ.get("SHORT_SHA", "")
          status = os.environ.get("JOB_STATUS", "")
          ts = os.environ.get("DEPLOY_TS", "")
          run_url = os.environ.get("RUN_URL", "")
          raw = os.environ.get("COMMIT_MSG", "") or ""
          lines = [ln for ln in raw.splitlines() if ln.strip()]
          msg = "\n".join(lines[:3]) if lines else "(无提交信息)"
          if len(msg) > 240:
              msg = msg[:240] + "…"
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "green" if ok else "red",
                      "title": {"tag": "plain_text",
                                "content": ("✅ 部署成功 · " if ok else "❌ 部署失败 · ") + repo},
                  },
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"**提交信息**\n{msg}"}},
                      {"tag": "hr"},
                      {"tag": "div", "fields": [
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**分支**\n{ref}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**提交**\n`{sha}`"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**结果**\n{status}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**时间**\n{ts}"}},
                      ]},
                      {"tag": "action", "actions": [
                          {"tag": "button", "type": "primary",
                           "text": {"tag": "plain_text", "content": "查看运行日志"},
                           "url": run_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text", "content": "🤖 UptimeKuma · CI/CD 部署告警"}]},
                  ],
              },
          }
          data = json.dumps(card).encode()
          req = urllib.request.Request(
              os.environ["FEISHU_INFRA_WEBHOOK"], data=data,
              headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"飞书响应 http={r.status} body={r.read().decode()}")
          except Exception as e:
              print(f"飞书通知失败(忽略): {e!r}")
          PY
