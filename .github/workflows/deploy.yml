name: Fusion API Windows CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusion-api-windows-ci-${{ github.ref }}
  cancel-in-progress: true

# 镜像源:阿里云 ACR 个人版(深圳,境内端点);改仓名只动 IMAGE_NAME 一行
env:
  REGISTRY: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com/seanfield/fusion-api

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 40
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Push CI/CD active metric
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="fusion-api",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="fusion-api",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} $now
          "@
          $body = (($metrics -replace "`r`n", "`n").Trim() + "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.10:9092/metrics/job/cicd_active/project_key/fusion-api/branch_key/master/environment_key/dev" -ContentType "text/plain; version=0.0.4" -Body $bytes

      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Build Docker image
        run: |
          docker build -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Architecture check in image
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" python scripts/check_architecture.py

      - name: Lint in image
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" sh -lc "pip install --no-cache-dir ruff && ruff check ."

      - name: Run tests
        timeout-minutes: 5
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" sh -lc "timeout 270s python -u -m unittest discover -s test -t . -v"

      - name: Login to ACR
        # Windows cmd 下 echo|--password-stdin 会把口令传歪致 ACR 401,改用 -p 直传
        run: docker login %REGISTRY% -u %ACR_USERNAME% -p %ACR_PASSWORD%
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image
        run: docker push "%IMAGE_NAME%:%GITHUB_SHA%"

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: |
          # 登录失败时重试退避（境内 ACR 通常稳定，保留重试作防御）
          n=0
          until echo "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker login 重试 $n 次仍失败"; exit 1; fi
            echo "docker login 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Apply alembic migrations
        run: |
          cd ~/project/fusion
          set -a
          source .env
          set +a
          n=0
          until docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker pull 重试 $n 次仍失败"; exit 1; fi
            echo "docker pull 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
          docker run --rm \
            --network postgres_default \
            -e DATABASE_URL="${DATABASE_URL}" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            alembic upgrade head

      - name: Pull and restart fusion-api
        run: |
          cd ~/project/fusion
          n=0
          until docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}; do
            n=$((n+1))
            if [ $n -ge 6 ]; then echo "docker pull 重试 $n 次仍失败"; exit 1; fi
            echo "docker pull 失败（网络抖动），第 $n 次，10s 后重试..."
            sleep 10
          done
          # dev 中 auth-service 只在 Docker 网络内暴露，未发布宿主机 8100。
          # 显式覆盖旧 .env 里的宿主机地址，避免 fusion-api JWKS/userinfo 校验连到不可达地址。
          export AUTH_SERVICE_INTERNAL_BASE_URL="http://auth-service:8100"
          cat > docker-compose.fusion-api-ghcr.yml <<'EOF'
          services:
            fusion-api:
              image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
              container_name: fusion-api
              command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
              restart: always
              ports:
                - "8002:8000"
              volumes:
                - ./fusion-api/logs:/app/logs
              environment:
                - DATABASE_URL=${DATABASE_URL}
                - SERVER_HOST=${SERVER_HOST}
                - FRONTEND_URL=${FRONTEND_URL}
                - CORS_ORIGINS=${CORS_ORIGINS}
                - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL}
                - AUTH_SERVICE_JWKS_URL=${AUTH_SERVICE_JWKS_URL}
                - AUTH_SERVICE_CLIENT_ID=${AUTH_SERVICE_CLIENT_ID}
                - AUTH_SERVICE_INTERNAL_BASE_URL=${AUTH_SERVICE_INTERNAL_BASE_URL:-http://auth-service:8100}
                - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
                - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
                - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
                - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                - REDIS_URL=${REDIS_URL:-redis://middleware-redis:6379/0}
                - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
                - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm-proxy:4000}
                - LITELLM_API_KEY=${LITELLM_API_KEY:-}
                - ENABLE_DOCS=false
              deploy:
                resources:
                  limits:
                    cpus: "1"
                    memory: 1g
              networks:
                - postgres_default
                - middleware_default

          networks:
            postgres_default:
              external: true
            middleware_default:
              external: true
          EOF
          docker compose -f docker-compose.fusion-api-ghcr.yml up -d

      - name: Verify health
        run: |
          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8002/health | grep -q '"status":"healthy"'; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" != "1" ]; then
            docker logs --tail=120 fusion-api || true
            exit 1
          fi

          docker exec fusion-api python - <<'PY'
          from app.core.config import settings
          import urllib.request

          url = settings.RESOLVED_AUTH_SERVICE_JWKS_URL
          with urllib.request.urlopen(url, timeout=5) as response:
              if response.status != 200:
                  raise SystemExit(f"auth JWKS check failed: http={response.status} url={url}")
          print(f"auth JWKS ok: {url}")
          PY

      - name: Cleanup old images
        if: always()
        run: |
          current="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ${{ env.IMAGE_NAME }} \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            fusion-api \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-api \
            "${{ env.DEPLOY_START }}"

      - name: 通知飞书(部署结果)
        if: always()
        continue-on-error: true
        env:
          FEISHU_INFRA_WEBHOOK: ${{ secrets.FEISHU_INFRA_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # 提交信息可含任意字符,只经 env 传入 python(os.environ→json),绝不进 shell,杜绝注入。
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$FEISHU_INFRA_WEBHOOK" ]; then
            echo "FEISHU_INFRA_WEBHOOK 未配置,跳过飞书通知"
            exit 0
          fi
          export SHORT_SHA="${GITHUB_SHA:0:7}"
          export DEPLOY_TS="$(date -u '+%Y-%m-%d %H:%M UTC')"
          python3 - <<'PY'
          import json, os, urllib.request
          ok = os.environ.get("JOB_STATUS") == "success"
          repo = os.environ.get("REPO", "")
          ref = os.environ.get("REF_NAME", "")
          sha = os.environ.get("SHORT_SHA", "")
          status = os.environ.get("JOB_STATUS", "")
          ts = os.environ.get("DEPLOY_TS", "")
          run_url = os.environ.get("RUN_URL", "")
          raw = os.environ.get("COMMIT_MSG", "") or ""
          lines = [ln for ln in raw.splitlines() if ln.strip()]
          msg = "\n".join(lines[:3]) if lines else "(无提交信息)"
          if len(msg) > 240:
              msg = msg[:240] + "…"
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "green" if ok else "red",
                      "title": {"tag": "plain_text",
                                "content": ("✅ 部署成功 · " if ok else "❌ 部署失败 · ") + repo},
                  },
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"**提交信息**\n{msg}"}},
                      {"tag": "hr"},
                      {"tag": "div", "fields": [
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**分支**\n{ref}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**提交**\n`{sha}`"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**结果**\n{status}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**时间**\n{ts}"}},
                      ]},
                      {"tag": "action", "actions": [
                          {"tag": "button", "type": "primary",
                           "text": {"tag": "plain_text", "content": "查看运行日志"},
                           "url": run_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text", "content": "🤖 UptimeKuma · CI/CD 部署告警"}]},
                  ],
              },
          }
          data = json.dumps(card).encode()
          req = urllib.request.Request(
              os.environ["FEISHU_INFRA_WEBHOOK"], data=data,
              headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"飞书响应 http={r.status} body={r.read().decode()}")
          except Exception as e:
              print(f"飞书通知失败(忽略): {e!r}")
          PY
