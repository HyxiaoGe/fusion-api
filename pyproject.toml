[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501", "E712"]

[tool.ruff.lint.per-file-ignores]
# alembic 自动生成的 migration 文件，docstring 模板里有 trailing whitespace
"alembic/versions/*.py" = ["W291"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
