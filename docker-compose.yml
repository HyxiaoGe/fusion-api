services:
  app:
    build: .
    container_name: fusion-api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SERVER_HOST=${SERVER_HOST:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL:-http://localhost:8100}
      - AUTH_SERVICE_JWKS_URL=${AUTH_SERVICE_JWKS_URL:-}
      - AUTH_SERVICE_CLIENT_ID=${AUTH_SERVICE_CLIENT_ID:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE=${ANTHROPIC_API_BASE:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_API_BASE=${GOOGLE_API_BASE:-}
      - HUNYUAN_APP_ID=${HUNYUAN_APP_ID:-}
      - HUNYUAN_SECRET_ID=${HUNYUAN_SECRET_ID:-}
      - HUNYUAN_SECRET_KEY=${HUNYUAN_SECRET_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - VOLCENGINE_API_KEY=${VOLCENGINE_API_KEY:-}
      - VOLCENGINE_API_BASE=${VOLCENGINE_API_BASE:-}
      - QIANFAN_AK=${QIANFAN_AK:-}
      - QIANFAN_SK=${QIANFAN_SK:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_API_BASE=${XAI_API_BASE:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - REDIS_URL=${REDIS_URL:-redis://middleware-redis:6379/0}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2g
    networks:
      - default
      - middleware

networks:
  default:
    name: fusion_fusion_network
    external: true
  middleware:
    name: middleware_default
    external: true
