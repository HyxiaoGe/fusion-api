services:
  flyai-adapter:
    profiles: ["flyai"]
    build:
      context: ./flyai-adapter
    container_name: fusion-flyai-adapter
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 256m
    cpus: 0.5
    environment:
      - FLYAI_API_KEY=${FLYAI_API_KEY:-}
      - FLYAI_ADAPTER_TOKEN=${FLYAI_ADAPTER_TOKEN:-}
      - PORT=8080
    networks:
      - flyai

  app:
    build: .
    container_name: fusion-api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SERVER_HOST=${SERVER_HOST:-http://localhost:8000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL:-http://localhost:8100}
      - AUTH_SERVICE_JWKS_URL=${AUTH_SERVICE_JWKS_URL:-}
      - AUTH_SERVICE_CLIENT_ID=${AUTH_SERVICE_CLIENT_ID:-}
      - AUTH_SERVICE_JWT_LEEWAY_SECONDS=${AUTH_SERVICE_JWT_LEEWAY_SECONDS:-5}
      - AUTH_SERVICE_INTERNAL_BASE_URL=${AUTH_SERVICE_INTERNAL_BASE_URL:-}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-}
      - ENABLE_DOCS=false
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE=${ANTHROPIC_API_BASE:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_API_BASE=${GOOGLE_API_BASE:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - VOLCENGINE_API_KEY=${VOLCENGINE_API_KEY:-}
      - VOLCENGINE_API_BASE=${VOLCENGINE_API_BASE:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_API_BASE=${XAI_API_BASE:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - REDIS_URL=${REDIS_URL:-redis://middleware-redis:6379/0}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - XIAOMI_API_KEY=${XIAOMI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-http://litellm-proxy:4000}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - ENABLE_FLYAI_TRAVEL_TOOLS=${ENABLE_FLYAI_TRAVEL_TOOLS:-false}
      - FLYAI_ADAPTER_BASE_URL=${FLYAI_ADAPTER_BASE_URL:-http://flyai-adapter:8080}
      - FLYAI_ADAPTER_TOKEN=${FLYAI_ADAPTER_TOKEN:-}
      - FLYAI_TRAVEL_TOOL_TIMEOUT_SECONDS=${FLYAI_TRAVEL_TOOL_TIMEOUT_SECONDS:-20}
      - FLYAI_TRAVEL_MAX_TOOL_CALLS_PER_RUN=${FLYAI_TRAVEL_MAX_TOOL_CALLS_PER_RUN:-4}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2g
    networks:
      - default
      - middleware
      - litellm_net
      - flyai

networks:
  default:
    name: fusion_fusion_network
    external: true
  middleware:
    name: middleware_default
    external: true
  litellm_net:
    external: true
    name: litellm-proxy_default
  flyai:
    name: fusion_flyai_network
